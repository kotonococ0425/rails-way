# rails-way 共有 RuboCop 設定（正本）。
# rubocop-rails-omakase をベースに、ハウススタイルの上乗せだけを明示する。
# 参照側アプリの Gemfile には rubocop-rails-omakase が必要（Rails 既定で入っている）。
#
# 使い方は README.md。設計判断（lint で表現できない規約）は RAILS_WAY.md が正本。
inherit_gem: { rubocop-rails-omakase: rubocop.yml }

AllCops:
  NewCops: enable

# ---- correctness 層 ----
# omakase はスタイル特化（DisabledByDefault）で、Lint / Security / Performance の
# correctness 系 department がほぼ眠る。そこは上流既定で有効化する。
# スタイル系（Metrics / Naming / Style の残り）を取り締まらないのは omakase の
# 判断に従う（そこを黙らせるために omakase を選んでいる）。
Lint:
  Enabled: true
Security:
  Enabled: true
Performance:
  Enabled: true

# spec / test の `expect { ... }.to change { ... }` 慣用句を誤検知しないようにする。
Lint/AmbiguousBlockAssociation:
  AllowedMethods:
    - change
    - not_change

# キーワード引数名は呼び出し契約の一部で、位置引数のように `_` 接頭辞へ改名できない
# （interface 準拠のフェイク実装などで未使用になるのは正当）。
Lint/UnusedMethodArgument:
  AllowUnusedKeywordArguments: true

# 文字列リテラルの凍結を全ファイルで宣言する（マジックコメント必須）。
Style/FrozenStringLiteralComment:
  Enabled: true

# omakase は OFF にしているが、access modifier の上下に空行を強制する（ハウススタイル）。
Layout/EmptyLinesAroundAccessModifier:
  Enabled: true

# ロケール固有文字列の直書きを禁止し、I18n / locale ファイル利用を強制する。
Rails/I18nLocaleTexts:
  Enabled: true

# strong parameters は params.expect を強制する（RAILS_WAY §2）。
# require().permit() は改ざん入力で 500、expect は ParameterMissing → 400 に倒れる。
Rails/StrongParametersExpect:
  Enabled: true

# ---- Rails correctness 選抜 ----
# 日付/時刻規約（RAILS_WAY §3）の機械化: 壁時計（Time.now / Date.today）を禁止し
# TZ 安全な API（Time.current / Date.current 等）に倒す。
Rails/TimeZone:
  Enabled: true
Rails/Date:
  Enabled: true

# 失敗を握りつぶさない: 返り値を見ない save / update は bang 版を強制する。
Rails/SaveBang:
  Enabled: true

# uniqueness validation は DB の unique index とセットで書く（アプリ層だけの
# 一意性は並行リクエストで破れる。「構造で強制」の原則）。
Rails/UniqueValidationWithoutIndex:
  Enabled: true

# 親削除時の子レコードの扱い（dependent:）を必ず明示する（orphan 防止）。
# DB の on_delete で賄う関連は、理由コメント + 個別 disable で明示する。
Rails/HasManyOrHasOneDependent:
  Enabled: true

# boolean カラムの三値化（NULL 許容）と、default なし NOT NULL 追加を禁止する。
Rails/ThreeStateBooleanColumn:
  Enabled: true
Rails/NotNullColumn:
  Enabled: true

# render 後の flash 代入（次リクエストへ漏れる実バグ）を検出する。
Rails/ActionControllerFlashBeforeRender:
  Enabled: true

# where.not(a: x, b: y) は NOT(a AND b) になる罠のため複数条件を禁止する。
Rails/WhereNotWithMultipleConditions:
  Enabled: true

# enum の値重複を検出する。
Rails/EnumUniqueness:
  Enabled: true

# validation を飛ばす API（upsert / update_column 等）を可視化する。
# 意図して飛ばす箇所（guarded writer 内部など・RAILS_WAY §3）は理由コメント +
# 個別 disable で境界を明示する。timestamp 専用の touch / touch_all と、
# テストのセットアップ（検証対象の状態を意図的に作る）は対象外。
Rails/SkipsModelValidations:
  Enabled: true
  AllowedMethods:
    - touch
    - touch_all
  Exclude:
    - 'spec/**/*'
    - 'test/**/*'

# rollback できない migration を検出する。
Rails/ReversibleMigration:
  Enabled: true

# アプリコードに puts / print を書かない（seeds は許可）。
Rails/Output:
  Enabled: true
  Exclude:
    - db/seeds.rb

# 定数は freeze する（mutable な定数が共有状態になるのを防ぐ）。
Style/MutableConstant:
  Enabled: true

# class メソッドは `def self.foo` でなく `class << self` ブロックで定義する
# （private はブロック内 `private` で書け、private_class_method の二重管理が不要になる）。
# module_function による stateless utility module は `def self.` を使わないため対象外。
Style/ClassMethodsDefinitions:
  Enabled: true
  EnforcedStyle: self_class

# 値が同名変数のときは必ず hash value 省略の糖衣構文で書く（`foo: foo` → `foo:`）。
# omakase は `either`（任意）だが、`always` で強制する。
Style/HashSyntax:
  EnforcedShorthandSyntax: always

# クラス内の記述順を Ruby Style Guide のレイアウトに統一する:
# module_inclusion → 定数 → マクロ(validates/association/scope/callback 等) →
# public class method → initialize → public method → protected → private。
# attr_reader は tier 分けしない（cop が macro の可視性を見ないため、専用 tier にすると
# service object の private attr_reader まで public 化を迫られカプセル化が壊れる）。
Layout/ClassStructure:
  Enabled: true
  Categories:
    module_inclusion:
      - include
      - prepend
      - extend
    macros:
      - belongs_to
      - has_one
      - has_many
      - has_and_belongs_to_many
      - validates
      - validate
      - validates_with
      - validates_each
      - scope
      - default_scope
      - normalizes
      - acts_as_tenant
      - has_secure_password
      - delegate
      - serialize
      - before_validation
      - after_validation
      - before_save
      - around_save
      - after_save
      - before_create
      - around_create
      - after_create
      - before_update
      - around_update
      - after_update
      - before_destroy
      - around_destroy
      - after_destroy
      - after_commit
      - after_rollback
      - after_initialize
      - after_find
  ExpectedOrder:
    - module_inclusion
    - constants
    - macros
    - public_class_methods
    - initializer
    - public_methods
    - protected_methods
    - private_methods
